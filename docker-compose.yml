services:
  sip-keepalive:
    image: ghcr.io/f4e9-user/sangfor-security-automation:playwright-latest
    build:
      context: .
      dockerfile: docker/Dockerfile.playwright
    command:
      - python
      - situation-awareness/sangfor_sip_cookie_keepalive.py
      - --session-file
      - /app/secrets/sip_session.json
      - --interval
      - "300"
      - --stop-on-need-login
      - --insecure
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./exports:/app/exports
      - ./runs:/app/runs
      - ./state:/app/state
      - ./logs:/app/logs
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

  firewall-keepalive:
    image: ghcr.io/f4e9-user/sangfor-security-automation:playwright-latest
    build:
      context: .
      dockerfile: docker/Dockerfile.playwright
    command:
      - python
      - firewall/firewall_keepalive.py
      - --session-file
      - /app/secrets/firewall_session.json
      - --status-file
      - /app/state/firewall_session.status.json
      - --interval
      - "300"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./exports:/app/exports
      - ./runs:/app/runs
      - ./state:/app/state
      - ./logs:/app/logs
      - ./secrets:/app/secrets:ro
    restart: unless-stopped

  pipeline:
    image: ghcr.io/f4e9-user/sangfor-security-automation:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["python", "pipeline/run_pipeline.py", "--help"]
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./exports:/app/exports
      - ./runs:/app/runs
      - ./state:/app/state
      - ./logs:/app/logs
      - ./secrets:/app/secrets:ro

  scheduler:
    image: ghcr.io/f4e9-user/sangfor-security-automation:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: ["python", "pipeline/scheduler.py", "--config", "/app/config/pipeline.yaml"]
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./exports:/app/exports
      - ./runs:/app/runs
      - ./state:/app/state
      - ./logs:/app/logs
      - ./secrets:/app/secrets:ro
    restart: unless-stopped
